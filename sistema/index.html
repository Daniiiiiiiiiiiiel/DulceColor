<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DulceColor — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --pink:#E8658A;--pink-deep:#C94070;--pink-pale:#FFF0F4;
      --text-dark:#111115;--text-mid:#4a5568;--text-light:#a0aec0;
      --border:#eed8e4;--white:#ffffff;--bg:#fcf9fa;
      --radius-lg:22px;
      --shadow:0 4px 20px rgba(0, 0, 0, 0.02);
      --t:.2s ease;
    }
    body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
    .wrap{width:100%;max-width:360px;animation:up .35s ease}
    @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    
    .brand{text-align:center;margin-bottom:2rem}
    .brand-logo-img{max-width:150px;height:auto;margin-bottom:0.8rem;object-fit:contain}
    .sub{font-size:.84rem;color:var(--text-light);font-weight:500}
    
    .card{
      background:var(--white);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:2.2rem 2rem;
      box-shadow:var(--shadow);
    }
    .field{margin-bottom:1.25rem}
    .field label{display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-mid);margin-bottom:.45rem}
    .field input{
      width:100%;
      padding:.78rem 1.2rem;
      border:1.5px solid var(--border);
      border-radius:50px; /* Inputs redondeados capsulares */
      font-size:.9rem;
      font-family:inherit;
      color:var(--text-dark);
      background:var(--white);
      outline:none;
      transition:all var(--t);
    }
    .field input:focus{
      border-color:var(--pink);
    }
    .btn{
      width:100%;
      padding:.85rem;
      background:linear-gradient(135deg,var(--pink),var(--pink-deep));
      color:var(--white);
      border:none;
      border-radius:50px; /* Botón capsular */
      font-size:.92rem;
      font-weight:600;
      font-family:inherit;
      cursor:pointer;
      transition:all var(--t);
      margin-top:.4rem;
    }
    .btn:hover{
      opacity:.9;
      transform:translateY(-1px);
    }
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
    
    .error{display:none;background:#fff0f0;border:1px solid #ffc9c9;color:#c0392b;border-radius:50px;padding:.65rem 1rem;font-size:.82rem;margin-bottom:1.1rem;text-align:center;font-weight:500}
    .error.show{display:block}
  </style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <img src="../web/assets/logo.png" alt="DulceColor" class="brand-logo-img" />
    <p class="sub">Panel de administración</p>
  </div>
  <div class="card">
    <div class="error" id="err">Credenciales incorrectas.</div>
    <form id="form">
      <div class="field">
        <label for="em">Correo electrónico</label>
        <input type="email" id="em" placeholder="admin@sweetstudio.cr" required autocomplete="username" />
      </div>
      <div class="field">
        <label for="pw">Contraseña</label>
        <input type="password" id="pw" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn" id="btn">Iniciar sesión</button>
    </form>
  </div>
</div>

<script src="env.js"></script>
<script>
  if (sessionStorage.getItem('ss_auth')==='true') location.replace('dashboard.html');

  document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();
    const errEl=document.getElementById('err'), btn=document.getElementById('btn');
    const email=document.getElementById('em').value.trim(), pw=document.getElementById('pw').value;
    errEl.classList.remove('show'); btn.disabled=true; btn.textContent='Verificando...';
    try {
      // Verificar en tabla admins + contraseña de env.js
      const r = await fetch(`${window.SUPABASE_URL}/rest/v1/admins?email=eq.${encodeURIComponent(email)}&select=id,nombre`, {
        headers:{ 'apikey':window.SUPABASE_SERVICE_KEY, 'Authorization':`Bearer ${window.SUPABASE_SERVICE_KEY}` }
      });
      const rows = await r.json();
      const valid = Array.isArray(rows) && rows.length>0 && email===window.ADMIN_EMAIL && pw===window.ADMIN_PASSWORD;
      if (valid) {
        sessionStorage.setItem('ss_auth','true');
        sessionStorage.setItem('ss_nombre', rows[0].nombre||'Admin');
        sessionStorage.setItem('ss_email', email);
        location.replace('dashboard.html');
      } else {
        errEl.textContent='Credenciales incorrectas.';
        errEl.classList.add('show'); btn.disabled=false; btn.textContent='Iniciar sesión';
      }
    } catch(err) {
      errEl.textContent='Error de conexión. Verifica env.js.';
      errEl.classList.add('show'); btn.disabled=false; btn.textContent='Iniciar sesión';
    }
  });
</script>
</body>
</html>
